<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colegio Domingo Sabio - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; font-weight: 500; }
        
        .container { padding: 20px 15px; max-width: 550px; margin: auto; padding-bottom: 120px; }

        /* SECCIONES DE LISTA */
        .seccion-titulo { font-size: 12px; font-weight: 800; color: #7f8c8d; margin: 25px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
        .seccion-titulo::after { content: ""; flex: 1; height: 1px; background: #ddd; margin-left: 10px; }

        .grid-meses { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-mes { background: var(--card); padding: 25px 10px; border-radius: 15px; text-align: center; font-weight: 800; border: 2px solid #eee; cursor: pointer; transition: 0.2s; color: var(--primary); font-size: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn-mes:active { transform: scale(0.96); background: #e8f0fe; }

        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #e0e0e0; }
        .stat-item { font-weight: 600; font-size: 13px; color: #7f8c8d; text-align: center; }
        .stat-item span { color: var(--primary); font-size: 18px; font-weight: 800; display: block; }

        .card-alumno { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.4s ease; overflow: hidden; }
        .card-alumno.confirmando { border-color: var(--success); background: #f0fff4; }
        .card-alumno.pagado-list { border-left: 6px solid var(--success); opacity: 0.8; background: #fafdfb; }

        .nombre-alumno { font-size: 14px; font-weight: 700; color: #34495e; text-transform: uppercase; flex: 1; padding-right: 10px; line-height: 1.3; }
        .label-cancelado { color: var(--success); font-weight: 800; font-size: 11px; margin-top: 3px; display: none; text-transform: uppercase; }
        
        .btn-accion { width: 45px; height: 45px; border-radius: 12px; border: 2px solid #ddd; background: #fafafa; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; color: #ccc; flex-shrink: 0; }
        .btn-accion.pagado { background: var(--success); border-color: var(--success); color: white; border-radius: 50%; }
        .btn-accion.revertir { border-color: var(--success); color: var(--success); background: white; }

        .vista { display: none; }
        .activa { display: block; animation: fadeIn 0.3s; }

        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); display: flex; justify-content: center; z-index: 90; border-top: 1px solid #eee; }
        .btn-pdf { background: #e74c3c; color: white; width: 100%; max-width: 520px; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2); }

        .back-btn { position: absolute; left: 10px; top: 22px; color: white; background: rgba(255,255,255,0.15); border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(3px); animation: fadeIn 0.2s; }
        .modal-pro { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        .modal-header-pro { text-align: center; margin-bottom: 20px; color: var(--primary); }
        .modal-body-pro { text-align: center; font-size: 15px; color: #555; margin-bottom: 25px; }
        .modal-footer-pro { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-pro">
            <div class="modal-header-pro"><h3 id="modalTituloText">Confirmar Registro</h3></div>
            <div class="modal-body-pro" id="modalCuerpoText"></div>
            <div class="modal-footer-pro">
                <button class="btn-modal" style="background: #f2f2f2; color: #7f8c8d;" onclick="cerrarModalPro()">Cancelar</button>
                <button class="btn-modal" style="background: var(--primary); color: white;" id="btnConfirmarPro">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="header">
        <button id="btnBack" class="back-btn" style="display:none" onclick="irAMeses()">←</button>
        <h1 id="mainTitle">DOMINGO SABIO</h1>
        <p id="subTitle">Control 2026 - Pagos de pensión</p>
    </div>

    <div class="container">
        <div id="vistaMeses" class="vista activa">
            <div class="grid-meses">
                <div class="btn-mes" onclick="verMes('marzo')">MARZO</div>
                <div class="btn-mes" onclick="verMes('abril')">ABRIL</div>
                <div class="btn-mes" onclick="verMes('mayonesa')">MAYO</div>
                <div class="btn-mes" onclick="verMes('junio')">JUNIO</div>
                <div class="btn-mes" onclick="verMes('julio')">JULIO</div>
                <div class="btn-mes" onclick="verMes('agosto')">AGOSTO</div>
                <div class="btn-mes" onclick="verMes('septiembre')">SEPTIEMBRE</div>
                <div class="btn-mes" onclick="verMes('octubre')">OCTUBRE</div>
                <div class="btn-mes" onclick="verMes('noviembre')">NOVIEMBRE</div>
                <div class="btn-mes" onclick="verMes('diciembre')">DICIEMBRE</div>
            </div>
        </div>

        <div id="vistaAlumnos" class="vista">
            <div class="stats-bar">
                <div class="stat-item">Recaudado <span>S/ <b id="sumaTotal">0</b></span></div>
                <div class="stat-item">Pendientes <span><b id="numFaltantes">0</b></span></div>
            </div>
            
            <div class="seccion-titulo">Estudiantes Pendientes</div>
            <div id="renderPendientes"></div>
            
            <div class="seccion-titulo" style="margin-top:40px">Pagos Realizados (Corregir error)</div>
            <div id="renderPagados"></div>
        </div>
    </div>

    <div class="footer-actions vista" id="footerAlumnos">
        <button class="btn-pdf" onclick="generarPDFPro()">📄 GENERAR REPORTE PDF OFICIAL</button>
    </div>

    <script>
        const miUrl = 'https://tgyzzfdwfwkfoohsxhpr.supabase.co';
        const miKey = 'sb_publishable_NMZfAA-gHJHQbXqmeycQEg_FmxRkpbj';
        const supabaseClient = supabase.createClient(miUrl, miKey);
        
        let mesActual = "";
        let alumnosData = [];

        async function verMes(mes) {
            mesActual = mes;
            const nMes = mes === 'mayonesa' ? 'MAYO' : mes.toUpperCase();
            document.getElementById('mainTitle').innerText = "MES DE " + nMes;
            document.getElementById('vistaMeses').classList.remove('activa');
            document.getElementById('vistaAlumnos').classList.add('activa');
            document.getElementById('footerAlumnos').classList.add('activa');
            document.getElementById('btnBack').style.display = 'flex';
            
            const { data } = await supabaseClient.from('alumnos').select('*').order('nombres_y_apellidos');
            alumnosData = data || [];
            mostrarAlumnos();
        }

        function mostrarAlumnos() {
            const penContainer = document.getElementById('renderPendientes');
            const pagContainer = document.getElementById('renderPagados');
            penContainer.innerHTML = ""; pagContainer.innerHTML = "";
            
            let countPendientes = 0;
            let countPagados = 0;

            alumnosData.forEach(al => {
                const id = al['identificación'] || al['identificacion'];
                const estaPagado = al[mesActual] === "PAGADO";
                const html = `
                    <div class="card-alumno ${estaPagado ? 'pagado-list' : ''}" id="card-${id}">
                        <div class="nombre-alumno">${al.nombres_y_apellidos}</div>
                        <button class="btn-accion ${estaPagado ? 'revertir' : ''}" onclick="abrirModalPro('${id}', '${al.nombres_y_apellidos}', ${estaPagado})">
                            ${estaPagado ? '🔄' : '○'}
                        </button>
                    </div>`;
                
                if(estaPagado) { pagContainer.innerHTML += html; countPagados++; }
                else { penContainer.innerHTML += html; countPendientes++; }
            });

            document.getElementById('numFaltantes').innerText = countPendientes;
            document.getElementById('sumaTotal').innerText = (countPagados * 50);
        }

        function abrirModalPro(id, nombre, estaPagado) {
            document.getElementById('modalTituloText').innerText = estaPagado ? "Anular Pago" : "Confirmar Pago";
            document.getElementById('modalCuerpoText').innerHTML = estaPagado ? 
                `¿Deseas revertir el pago de <b>${nombre}</b>? Se marcará como pendiente.` :
                `¿Confirmas que <b>${nombre}</b> ha cancelado la pensión de este mes?`;
            
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('btnConfirmarPro').onclick = () => procesarCambio(id, estaPagado);
        }

        async function procesarCambio(id, estabaPagado) {
            cerrarModalPro();
            const nuevoEstado = estabaPagado ? "NULO" : "PAGADO";
            
            const { error } = await supabaseClient.from('alumnos').update({ [mesActual]: nuevoEstado }).eq('identificación', id);
            if(error) await supabaseClient.from('alumnos').update({ [mesActual]: nuevoEstado }).eq('identificacion', id);
            
            alumnosData = alumnosData.map(al => {
                if((al['identificación'] || al['identificacion']) == id) al[mesActual] = nuevoEstado;
                return al;
            });
            mostrarAlumnos();
        }

        function cerrarModalPro() { document.getElementById('modalOverlay').style.display = 'none'; }
        function irAMeses() { location.reload(); }

        function generarPDFPro() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const fecha = new Date().toLocaleString();
            const nMes = mesActual === 'mayonesa' ? 'MAYO' : mesActual.toUpperCase();

            doc.setFontSize(18); doc.setTextColor(26, 115, 232);
            doc.text("COLEGIO DOMINGO SABIO", 14, 20);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text(`CONTROL DE PENSIONES - MES: ${nMes} / AÑO: 2026`, 14, 28);

            const rows = alumnosData.map(al => [
                al.nombres_y_apellidos,
                al[mesActual] === "PAGADO" ? "PAGADO" : "PENDIENTE",
                al[mesActual] === "PAGADO" ? "S/ 50.00" : "S/ 0.00"
            ]);

            doc.autoTable({
                startY: 35, head: [["ESTUDIANTE", "ESTADO", "MONTO"]], body: rows,
                theme: 'striped', headStyles: { fillColor: [26, 115, 232] },
                didDrawPage: (d) => {
                    doc.setFontSize(8); doc.setTextColor(150);
                    doc.text(`Trazabilidad: Generado el ${fecha} - Sistema de Control Domingo Sabio`, 14, doc.internal.pageSize.height - 10);
                }
            });
            doc.save(`Reporte_${nMes}_2026.pdf`);
        }
    </script>
</body>
</html>
